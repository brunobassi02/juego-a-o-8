<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioChallenge Pro: Reino Animal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1565c0;
            --accent: #fbc02d;
            --light: #f1f8e9;
            --dark: #263238;
            --correct: #4caf50;
            --wrong: #f44336;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary);
            color: white;
            width: 100%;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #game-container {
            max-width: 600px;
            width: 90%;
            background: white;
            margin: 2rem 0;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Pantallas */
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }

        /* Inputs y Botones */
        input[type="text"] {
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1rem;
            outline: none;
        }

        button {
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }

        .btn-main { background-color: var(--secondary); color: white; }
        .btn-main:hover { background-color: #0d47a1; transform: translateY(-2px); }
        
        .option-btn { background-color: #f5f5f5; text-align: left; }
        .option-btn:hover { background-color: #e0e0e0; }
        
        .correct { background-color: var(--correct) !important; color: white; }
        .wrong { background-color: var(--wrong) !important; color: white; }

        /* Ranking Table */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .leaderboard-table tr:nth-child(even) { background-color: #f9f9f9; }
        .rank-number { font-weight: bold; color: var(--primary); width: 30px; }

        .hidden { display: none; }
        .feedback { padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h1>🌿 BioChallenge Explorer</h1>
</header>

<div id="game-container">
    
    <!-- PANTALLA 1: REGISTRO -->
    <div id="login-screen" class="screen active">
        <h2>¡Bienvenido, Biólogo!</h2>
        <p>Ingresa tu nombre o apodo para comenzar:</p>
        <input type="text" id="player-name" placeholder="Ej: Darwin_2024" maxlength="15">
        <button class="btn-main" onclick="goToMenu()">Continuar</button>
    </div>

    <!-- PANTALLA 2: SELECCIÓN DE TEMA -->
    <div id="menu-screen" class="screen">
        <h2>Hola <span id="display-name"></span>, elige un tema:</h2>
        <button class="btn-main" onclick="startQuiz('Nomenclatura')">Nomenclatura Binomial</button>
        <button class="btn-main" onclick="startQuiz('Claves Dicot.')">Claves Dicotómicas</button>
        <button class="btn-main" onclick="startQuiz('Los 5 Reinos')">Los 5 Reinos</button>
        <button class="btn-main" onclick="startQuiz('Artrópodos')">Artrópodos</button>
        <button class="btn-main" onclick="startQuiz('Vertebrados')">Vertebrados</button>
    </div>

    <!-- PANTALLA 3: JUEGO (QUIZ) -->
    <div id="quiz-screen" class="screen">
        <div style="display:flex; justify-content: space-between; font-weight: bold;">
            <span>Puntos: <span id="score">0</span></span>
            <span id="current-topic-name"></span>
        </div>
        <hr>
        <h3 id="question-text">Pregunta</h3>
        <div id="options-container" style="display: flex; flex-direction: column;"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="next-btn" class="btn-main hidden" onclick="handleNext()">Siguiente Pregunta</button>
    </div>

    <!-- PANTALLA 4: RESULTADO Y RANKING -->
    <div id="end-screen" class="screen">
        <h2>¡Gran trabajo!</h2>
        <p>Tu puntaje final es: <strong id="final-score">0</strong> puntos.</p>
        
        <h3>🏆 Top 10 de la Clase</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Estudiante</th>
                    <th>Puntos</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Los datos de Firebase se cargarán aquí -->
            </tbody>
        </table>
        <br>
        <button class="btn-main" onclick="location.reload()">Jugar de Nuevo</button>
    </div>

</div>

<script type="module">
    // --- CONFIGURACIÓN DE FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ⚠️ REEMPLAZA ESTE OBJETO CON TUS CREDENCIALES DE FIREBASE ⚠️
   const firebaseConfig = {
  apiKey: "AIzaSyDyo4-VMaKFXy7fFAdscwqkdCCxAV8L5wU",
  authDomain: "biochallenge-b094e.firebaseapp.com",
  projectId: "biochallenge-b094e",
  storageBucket: "biochallenge-b094e.firebasestorage.app",
  messagingSenderId: "725761705810",
  appId: "1:725761705810:web:c0206f9c80274abb62dc8b"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- BASE DE DATOS DE PREGUNTAS (Resumen para ejemplo) ---
    const questions = [
        { topic: 'Nomenclatura', q: '¿Cuál es el formato correcto para escribir el nombre científico?', o: ['Panthera Leo', 'panthera leo', 'Panthera leo (en cursiva)', 'panthera Leo'], a: 2, f: 'Género en mayúscula, especie en minúscula y en cursiva.' },
        { topic: 'Nomenclatura', q: '¿Por qué se usa el latín?', o: ['Es fácil', 'Es lengua muerta y universal', 'Por religión', 'Suena mejor'], a: 1, f: 'Al ser lengua muerta, no cambia y es igual en todo el mundo.' },
        { topic: 'Claves Dicot.', q: 'Dicotómica significa división en...', o: ['3 partes', '1 parte', '2 partes', '4 partes'], a: 2, f: 'Siempre hay dos opciones opuestas (a o b).' },
        { topic: 'Los 5 Reinos', q: '¿Reino de las bacterias?', o: ['Fungi', 'Monera', 'Plantae', 'Protoctista'], a: 1, f: 'Monera agrupa procariotas.' },
        { topic: 'Artrópodos', q: '¿Cuántas patas tiene un insecto?', o: ['4', '6', '8', '10'], a: 1, f: 'Tres pares de patas es la regla.' },
        { topic: 'Vertebrados', q: 'Los delfines son:', o: ['Peces', 'Anfibios', 'Mamíferos', 'Reptiles'], a: 2, f: 'Tienen pulmones y dan leche.' }
        // Se pueden añadir las 50 aquí siguiendo el mismo formato.
    ];

    // --- LÓGICA DEL JUEGO ---
    let playerName = "";
    let currentScore = 0;
    let selectedQuestions = [];
    let currentIndex = 0;

    window.goToMenu = function() {
        playerName = document.getElementById('player-name').value.trim();
        if (playerName.length < 3) {
            alert("Por favor, ingresa un nombre válido.");
            return;
        }
        document.getElementById('display-name').innerText = playerName;
        switchScreen('menu-screen');
    }

    window.startQuiz = function(topic) {
        selectedQuestions = questions.filter(q => q.topic === topic);
        if(selectedQuestions.length === 0) selectedQuestions = [questions[0]]; // Fallback
        currentIndex = 0;
        currentScore = 0;
        document.getElementById('current-topic-name').innerText = topic;
        switchScreen('quiz-screen');
        showQuestion();
    }

    function showQuestion() {
        const qData = selectedQuestions[currentIndex];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('score').innerText = currentScore;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');

        qData.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.classList.add('option-btn');
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
    }

    function checkAnswer(choice) {
        const qData = selectedQuestions[currentIndex];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');

        buttons.forEach(btn => btn.disabled = true);

        if (choice === qData.a) {
            buttons[choice].classList.add('correct');
            currentScore += 100;
            feedback.innerText = "✅ ¡Correcto! " + qData.f;
            feedback.style.backgroundColor = "#c8e6c9";
        } else {
            buttons[choice].classList.add('wrong');
            buttons[qData.a].classList.add('correct');
            feedback.innerText = "❌ Incorrecto. " + qData.f;
            feedback.style.backgroundColor = "#ffcdd2";
        }

        feedback.classList.remove('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('score').innerText = currentScore;
    }

    window.handleNext = function() {
        currentIndex++;
        if (currentIndex < selectedQuestions.length) {
            showQuestion();
        } else {
            finishGame();
        }
    }

    async function finishGame() {
        document.getElementById('final-score').innerText = currentScore;
        switchScreen('end-screen');
        
        try {
            // 1. Guardar en Firebase
            await addDoc(collection(db, "leaderboard"), {
                name: playerName,
                score: currentScore,
                date: serverTimestamp()
            });
            
            // 2. Cargar Ranking
            loadLeaderboard();
        } catch (e) {
            console.error("Error al guardar puntos: ", e);
        }
    }

    async function loadLeaderboard() {
        const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
        const querySnapshot = await getDocs(q);
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        
        let rank = 1;
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const row = `<tr>
                <td class="rank-number">${rank++}</td>
                <td>${data.name}</td>
                <td>${data.score}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
